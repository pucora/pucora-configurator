apiVersion: configurator.pucora.in/v1
kind: GatewayProfile
metadata:
  name: Async Kafka Consumer
  description: Background Kafka consumer forwarding events to a webhook

gateway:
  port: 8080

compose:
  enabled: true
  mock_backend: true

telemetry:
  logging:
    level: WARNING
    stdout: true
  usage:
    enabled: false

env:
  KAFKA_BROKERS: redpanda:9092

async_agents:
  - name: events-consumer
    consumer:
      topic: events
      workers: 2
      timeout: 2s
    backend:
      host: http://mock-webhook:8081
      path: /ingest
      method: POST
    connection:
      max_retries: 3
      backoff_strategy: linear
      health_interval: 10s
    kafka:
      brokers: [redpanda:9092]
      group_id: pucora-async-smoke
      client_id: pucora_async_agent
