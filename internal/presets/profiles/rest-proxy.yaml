apiVersion: configurator.pucora.in/v1
kind: GatewayProfile
metadata:
  name: REST API Proxy
  description: Simple HTTP reverse proxy with CORS and header forwarding

gateway:
  port: 8080
  timeout: 3s

cors:
  enabled: true
  allow_origins:
    - http://localhost:3000
    - http://localhost:5173
  allow_methods: [GET, POST, PUT, PATCH, DELETE, OPTIONS]
  allow_headers: [Origin, Authorization, Content-Type, Accept, X-Request-ID]

telemetry:
  logging:
    level: INFO
    stdout: true
  metrics:
    enabled: true
    listen_address: ":8090"
  usage:
    enabled: false

routes:
  - path: /api/{path}
    method: GET
    headers:
      forward: [Authorization, Content-Type, Accept, X-Request-ID]
    query_strings:
      forward: ["*"]
    backend:
      type: http
      host: http://localhost:8000
      path: /{path}

  - path: /api/{path}
    method: POST
    headers:
      forward: [Authorization, Content-Type, Accept]
    backend:
      type: http
      host: http://localhost:8000
      path: /{path}
      method: POST
