apiVersion: configurator.pucora.io/v1
kind: GatewayProfile
metadata:
  name: my-gateway
  description: Edit this file, then run velonetics-config generate -f profile.yaml -o ./output

gateway:
  port: 8080
  timeout: 3s
  cache_ttl: 3600s

# Enable browser cross-origin access
cors:
  enabled: true
  allow_origins:
    - http://localhost:3000
  allow_methods: [GET, POST, PUT, DELETE, OPTIONS]
  allow_headers: [Origin, Authorization, Content-Type]

telemetry:
  logging:
    level: INFO
    stdout: true
  metrics:
    enabled: true
    listen_address: ":8090"
  usage:
    enabled: false

# Optional: broker credentials written to .env on generate
# env:
#   KAFKA_BROKERS: localhost:9092

routes:
  - path: /api/users/{id}
    method: GET
    headers:
      forward: [Authorization, Content-Type]
    query_strings:
      forward: [fields]
    backend:
      type: http
      host: http://localhost:8000
      path: /users/{id}

  # - path: /events
  #   method: POST
  #   backend:
  #     type: kafka
  #     host: localhost:9092
  #     path: /ignored
  #     topic: events
