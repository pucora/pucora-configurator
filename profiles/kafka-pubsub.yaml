apiVersion: configurator.pucora.io/v1
kind: GatewayProfile
metadata:
  name: Kafka Pub/Sub Gateway
  description: Publish and subscribe to Kafka topics via REST endpoints

gateway:
  port: 8080

cors:
  enabled: true
  allow_origins: ["*"]
  allow_methods: [GET, POST, OPTIONS]
  allow_headers: [Origin, Authorization, Content-Type]

compose:
  enabled: true

telemetry:
  logging:
    level: WARNING
    stdout: true
  usage:
    enabled: false

env:
  KAFKA_BROKERS: localhost:9092

routes:
  - path: /events
    method: POST
    headers:
      forward: [Content-Type, X-Event-Key]
    backend:
      type: kafka
      host: localhost:9092
      path: /ignored
      topic: events

  - path: /events
    method: GET
    backend:
      type: kafka
      host: localhost:9092
      path: /ignored
      subscription: events
      consumer_group: my-consumer-group
